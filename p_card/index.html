<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="profile-card">
        
        <div class="avatar">
            <img src="profile.jpg" alt="Profile Photo">
        </div>

        <div class="profile-info">
            <h1>Alvin Kiarie</h1>
            <hr>
            <h2>Bachelor of Science in Computer Security and Forensics</h2>
        </div>

        <div class="bio">
            <p>A first year student at <b>Kabarak University</b> currently studying <i>Computer Security and Forensics</i><br> under the School of Science Engineering and Technology</p>
        </div>

        <button class="view-btn">Contacts</button>

        <h4 style="color: white;">Contact</h4>
        <div class="social-links">
            <img src="instagram.jpg" alt="Instagram">
            <img src="x.jpg" alt="X">
            <img src="whatsapp.jpg" alt="WhatsApp">
        </div>
        <p class="phone">Phone: +254 000 000 000</p>
    </section>
    </body>
</html>

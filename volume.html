<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volume</title>
</head>
<body>
        <label>Enter length</label>
        <input type="number" id="l" placeholder="length"><br>
        <label>Enter height</label>
        <input type="number" id="h" placeholder="height"><br>
        <label>Enter width</label>
        <input type="number" id="w" placeholder="width"><br>
        <button onclick="calculate()">Calculate</button>
        <hr>
        <p id="results"></p>
    <script>

        function calculate(){

            let l = document.getElementById("l").value;
            let w = document.getElementById("w").value;
            let h = document.getElementById("h").value;

            let volume = l*w*h ;

            document.getElementById("results").innerHTML="The volume is: " + volume; 
            console.log(volume);
        };
        // console.log("Volume is a cuboid is:" + volume + "when height is:" + h + "width is:" + w + "and length is: " + l);
        // document.writeln("Volume is a cuboid is: " + volume + "<br>when height is: " + h + "<br>width is: " + w + "<br>and length is: " + l);
    </script>
</body>
</html>
